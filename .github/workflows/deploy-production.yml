name: 部署到生产环境

on:
  push:
    tags:
      - "github-v*"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 提取版本号
        id: extract_tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/hy-admin:${{ steps.extract_tag.outputs.tag }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/hy-admin:production
          build-args: |
            VITE_APP_BASE_URL=${{ secrets.VITE_APP_BASE_URL }}
            VITE_APP_TITLE=${{ secrets.VITE_APP_TITLE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 部署到生产服务器
        id: deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e

            IMAGE="${{ secrets.DOCKER_HUB_USERNAME }}/hy-admin:${{ steps.extract_tag.outputs.tag }}"
            COMPOSE_FILE="/opt/hy-platform-web/docker-compose.yml"
            CONTAINER="hy-platform-web"

            echo "=========================================="
            echo "  部署镜像: ${IMAGE}"
            echo "=========================================="

            # 1. 拉取最新镜像
            echo "[1/4] 拉取镜像..."
            docker pull "${IMAGE}"

            # 2. 确保部署目录和 compose 文件存在
            echo "[2/4] 准备 compose 文件..."
            mkdir -p /opt/hy-platform-web

            cat > "${COMPOSE_FILE}" << 'COMPOSE_EOF'
            version: '3.8'

            services:
              frontend:
                image: IMAGE_PLACEHOLDER
                container_name: hy-platform-web
                ports:
                  - "80:80"
                restart: unless-stopped
                healthcheck:
                  test: ["CMD", "wget", "-qO-", "http://localhost/health"]
                  interval: 30s
                  timeout: 5s
                  retries: 3
                  start_period: 10s
                logging:
                  driver: "json-file"
                  options:
                    max-size: "10m"
                    max-file: "3"
                deploy:
                  resources:
                    limits:
                      cpus: "0.50"
                      memory: "256M"
                    reservations:
                      cpus: "0.25"
                      memory: "128M"
            COMPOSE_EOF

            sed -i "s|IMAGE_PLACEHOLDER|${IMAGE}|g" "${COMPOSE_FILE}"

            # 3. 滚动更新容器（自动停旧启新）
            echo "[3/4] 更新容器..."
            docker compose -f "${COMPOSE_FILE}" up -d --remove-orphans

            # 4. 等待健康检查通过
            echo "[4/4] 等待健康检查..."
            HEALTHY=0
            for i in $(seq 1 30); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' "${CONTAINER}" 2>/dev/null || echo "not_found")
              if [ "${STATUS}" = "healthy" ]; then
                echo "✅ 容器健康检查通过"
                HEALTHY=1
                break
              fi
              echo "  [${i}/30] 状态: ${STATUS}，等待中..."
              sleep 3
            done

            if [ "${HEALTHY}" != "1" ]; then
              echo "❌ 健康检查失败，查看最近日志:"
              docker compose -f "${COMPOSE_FILE}" logs --tail=50
              exit 1
            fi

            echo "=========================================="
            echo "  ✅ 部署成功: ${IMAGE}"
            echo "=========================================="

      - name: 汇总部署结果
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ ${{ steps.extract_tag.outputs.tag }} 部署成功"
          else
            echo "❌ ${{ steps.extract_tag.outputs.tag }} 部署失败"
          fi
