---
kind: pipeline
type: docker
name: CI/CD 测试

trigger:
  branch:
    - master
  event:
    - push
    - pull_request

steps:
  - name: 安装依赖
    image: "node:22-alpine"
    commands:
      - corepack enable
      - "corepack prepare pnpm@9.15.0 --activate"
      - pnpm install --frozen-lockfile

  - name: 校验代码
    image: "node:22-alpine"
    commands:
      - corepack enable
      - "corepack prepare pnpm@9.15.0 --activate"
      - pnpm lint

  - name: 校验格式化是否正确
    image: "node:22-alpine"
    commands:
      - corepack enable
      - "corepack prepare pnpm@9.15.0 --activate"
      - "pnpm format:check"

  - name: 构建项目
    image: "node:22-alpine"
    commands:
      - corepack enable
      - "corepack prepare pnpm@9.15.0 --activate"
      - pnpm build
