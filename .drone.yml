---
kind: pipeline
type: docker
name: CI/CD 测试

trigger:
  branch:
    - master
  event:
    - push
    - pull_request

steps:
  - name: install
    image: "node:20-alpine"
    commands:
      - corepack enable
      - "corepack prepare pnpm@9.15.0 --activate"
      - pnpm install --frozen-lockfile

  - name: lint
    image: "node:20-alpine"
    commands:
      - corepack enable
      - "corepack prepare pnpm@9.15.0 --activate"
      - pnpm lint

  - name: format-check
    image: "node:20-alpine"
    commands:
      - corepack enable
      - "corepack prepare pnpm@9.15.0 --activate"
      - "pnpm format:check"

  - name: build
    image: "node:20-alpine"
    commands:
      - corepack enable
      - "corepack prepare pnpm@9.15.0 --activate"
      - pnpm build
