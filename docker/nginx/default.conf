# Nginx 配置文件

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;

    # Docker 内置 DNS，变量 proxy_pass 必须指定 resolver
    resolver 127.0.0.11 valid=30s;

    # Gzip 压缩配置
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
    gzip_comp_level 6;

    # 缓存配置
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        add_header Access-Control-Allow-Origin *;
    }

    # 针对 assets 目录下的带哈希资源，建议不设置强缓存，或者设置较短的缓存
    # 因为它们的名字变了就等于更新了，不需要靠缓存时间来控制
    location ~* ^/assets/.*\.(js|css)$ {
        # 依然可以开启 gzip，但不设置长期的 expires
        add_header Access-Control-Allow-Origin *;
        # 也可以选择设置一年的缓存，因为它们的文件名变了浏览器自然会重新下载
        # expires 1y;
        # add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # 前端静态资源
    location / {
        index index.html; 
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # API 反向代理 - 转发到 hu-platform 的 gateway 服务
    # /api/ 前缀的请求转发到 gateway:8080
    # 使用变量方式，Nginx 在请求时才解析域名，避免启动时 gateway 不存在导致容器失败
    location /api/ {
        set $gateway_host gateway;
        client_max_body_size 50M;
        proxy_pass http://$gateway_host:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 健康检查
    location /health {
        access_log off;
        return 200 "OK\n";
    }

    # 错误页面
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
