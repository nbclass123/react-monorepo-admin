version: '3.8'

services:
  # 前端服务
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hy-platform-frontend
    ports:
      - "8088:80"
    environment:
      - VITE_API_URL=http://localhost:8081/api
      - VITE_APP_TITLE=呼呼呼
    networks:
      - hy-platform-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 后端服务（示例配置，根据实际情况修改）
  backend:
    image: openjdk:21-jdk-alpine
    container_name: hy-platform-backend
    ports:
      - "8081:8080"
    volumes:
      - ./backend:/app
    working_dir: /app
    command: ["java", "-jar", "hy-platform.jar"]
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DATABASE_URL=jdbc:mysql://mysql:3306/example_db
      - DATABASE_USERNAME=admin
      - DATABASE_PASSWORD=password
    networks:
      - hy-platform-network
    depends_on:
      - mysql
    restart: unless-stopped

  # MySQL 数据库（示例配置）
  mysql:
    image: mysql:8.0
    container_name: hy-platform-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=example_db
      - MYSQL_USER=admin
      - MYSQL_PASSWORD=password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - hy-platform-network
    restart: unless-stopped

networks:
  hy-platform-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
