version: '3.8'

# ============================================================
# hu-platform 前端独立部署配置
#
# 与后端系统（E:\javaProject\hy-platform\.docs\docker-compose.yml）
# 使用相同的网络名称 hu-platform-net，实现容器间互通
#
# 使用方式：
#   1. 先启动后端：cd E:\javaProject\hy-platform\.docs && docker-compose up -d
#   2. 再启动前端：cd e:\myProject\hy-admin && docker-compose up -d
#
# 架构说明：
#   - 前端（8088）-> gateway（8080）-> 各业务服务
# ============================================================

services:
  # 前端服务
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # API 路径前缀，通过 Nginx 反向代理
        # 例如：/api/auth/user/login -> Nginx -> gateway:8080/api/auth/user/login
        - VITE_APP_BASE_URL=http://localhost:8080/api
        - VITE_APP_TITLE=呼呼呼
    container_name: hy-platform-web
    ports:
      - "8088:80"
    networks:
      # 使用与后端相同的网络，实现容器间通信
      - hu-platform-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# 引用后端项目已创建的网络（不重复创建）
networks:
  hu-platform-net:
    external: true
