version: '3.8'

# ============================================================
# Production Docker Compose - hy-platform 前端部署
#
# 使用场景：生产服务器上运行，拉取 Docker Hub 预构建镜像
# 镜像由 GitHub Actions CI/CD 构建并推送
#
# 使用方式：
#   部署：IMAGE_TAG=v1.0.0 DOCKER_HUB_USERNAME=xxx docker compose -f docker-compose.prod.yml up -d
#   停止：docker compose -f docker-compose.prod.yml down
#   重启：docker compose -f docker-compose.prod.yml restart
#
# 架构说明：
#   浏览器 -> Nginx:80 -> (同网络) gateway:8080 -> 后端服务
# ============================================================

services:
  frontend:
    image: ${DOCKER_HUB_USERNAME:-253600}/hy-admin:${IMAGE_TAG:-latest}
    container_name: hy-platform-web
    ports:
      - "80:80"
    networks:
      - hu-platform-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: "256M"
        reservations:
          cpus: "0.25"
          memory: "128M"

networks:
  hu-platform-net:
    external: true
